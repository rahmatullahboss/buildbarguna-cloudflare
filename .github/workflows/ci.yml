name: CI - Test & Security Scan

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1: Lint & Type Check
  # ════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

  # ════════════════════════════════════════════════════════
  # JOB 2: Unit Tests
  # ════════════════════════════════════════════════════════
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: buildbarguna-cloudflare/test-results/
          retention-days: 7

  # ════════════════════════════════════════════════════════
  # JOB 3: Build Test
  # ════════════════════════════════════════════════════════
  build:
    name: 🔨 Build Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            buildbarguna-cloudflare/package-lock.json
            buildbarguna-cloudflare/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: npm ci
        working-directory: buildbarguna-cloudflare/frontend

      - name: Build frontend
        run: npm run build
        working-directory: buildbarguna-cloudflare/frontend
        env:
          VITE_R2_PUBLIC_URL: https://placeholder.r2.dev
          CI: true

      - name: Verify build output
        run: |
          echo "📦 Checking build output..."
          ls -lh dist/
          test -f dist/index.html || exit 1
          test -d dist/assets/ || exit 1
          echo "✅ Build successful"

  # ════════════════════════════════════════════════════════
  # JOB 4: Security Scan
  # ════════════════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (fix available)
        run: npm audit fix --dry-run
        continue-on-error: true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit
          path: buildbarguna-cloudflare/npm-audit.json
          retention-days: 30

  # ════════════════════════════════════════════════════════
  # JOB 5: Database Migration Test
  # ════════════════════════════════════════════════════════
  migrations:
    name: 🗄️ Database Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate migration files
        run: |
          echo "📋 Validating migration files..."
          for file in src/db/migrations/*.sql; do
            echo "Checking: $file"
            # Basic SQL syntax validation (check for common errors)
            if grep -q "CREATE TABLE" "$file" || grep -q "ALTER TABLE" "$file"; then
              echo "  ✓ Contains valid migration statements"
            else
              echo "  ⚠ Warning: No migration statements found"
            fi
          done
          echo "✅ Migration validation complete"

      - name: Check migration numbering
        run: |
          echo "🔢 Checking migration numbering..."
          ls -1 src/db/migrations/*.sql | sort | while read file; do
            echo "  - $(basename $file)"
          done

  # ════════════════════════════════════════════════════════
  # JOB 6: Durable Objects Configuration Test
  # ════════════════════════════════════════════════════════
  durable-objects:
    name: ⚡ Durable Objects Config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate wrangler.toml configuration
        run: |
          echo "🔍 Validating wrangler.toml..."
          if grep -q "durable_objects.bindings" wrangler.toml; then
            echo "  ✓ Durable Objects bindings found"
          else
            echo "  ✗ Durable Objects bindings missing!"
            exit 1
          fi
          
          if grep -q "RATE_LIMITER" wrangler.toml; then
            echo "  ✓ RATE_LIMITER binding configured"
          else
            echo "  ✗ RATE_LIMITER binding missing!"
            exit 1
          fi
          
          echo "✅ wrangler.toml validation complete"

      - name: Verify Durable Object exports
        run: |
          echo "🔍 Verifying Durable Object exports..."
          if grep -q "export.*RateLimiter" src/index.ts; then
            echo "  ✓ RateLimiter exported from index.ts"
          else
            echo "  ✗ RateLimiter not exported!"
            exit 1
          fi
          
          if [ -f "src/durable-objects/rate-limiter.ts" ]; then
            echo "  ✓ RateLimiter file exists"
          else
            echo "  ✗ RateLimiter file missing!"
            exit 1
          fi
          
          echo "✅ Durable Objects configuration valid"

  # ════════════════════════════════════════════════════════
  # Summary
  # ════════════════════════════════════════════════════════
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build, security, migrations, durable-objects]
    if: always()

    steps:
      - name: Generate CI summary
        run: |
          echo "## 🎯 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Migrations | ${{ needs.migrations.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Durable Objects | ${{ needs.durable-objects.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.build.result }}" == "success" && "${{ needs.durable-objects.result }}" == "success" ]]; then
            echo "✅ **All critical checks passed!** Ready for review." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some checks failed.** Please review the logs." >> $GITHUB_STEP_SUMMARY
          fi
