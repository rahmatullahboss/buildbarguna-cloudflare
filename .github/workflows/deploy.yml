name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1: Test → Build → Deploy website to Cloudflare
  # ════════════════════════════════════════════════════════
  deploy-web:
    name: 🌐 Test → Build → Deploy Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            buildbarguna-cloudflare/package-lock.json
            buildbarguna-cloudflare/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: npm ci
        working-directory: buildbarguna-cloudflare/frontend

      - name: Run unit tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build
        working-directory: buildbarguna-cloudflare/frontend

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Upload web build to R2 via AWS CLI (separate R2 account)
      - name: Install AWS CLI
        run: pip install awscli --quiet

      - name: Upload web build to R2
        run: |
          BUILD_DATE=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=${GITHUB_SHA::7}
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          # Upload versioned snapshot
          aws s3 sync dist/ "s3://${BUCKET}/builds/web/${BUILD_DATE}-${SHORT_SHA}/" \
            --endpoint-url "$ENDPOINT" \
            --no-progress

          # Upload latest/ snapshot
          aws s3 sync dist/ "s3://${BUCKET}/builds/web/latest/" \
            --endpoint-url "$ENDPOINT" \
            --delete \
            --no-progress

          echo "✅ Web build uploaded to R2: builds/web/${BUILD_DATE}-${SHORT_SHA}/"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Write deployment summary
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          echo "## 🌐 Web Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build date** | ${BUILD_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **R2 backup** | \`builds/web/latest/\` |" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════
  # JOB 2: Build Android APK → Upload to R2
  # ════════════════════════════════════════════════════════
  build-android:
    name: 📱 Build Android APK → Upload to R2
    runs-on: ubuntu-latest
    needs: deploy-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/frontend/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci
        working-directory: buildbarguna-cloudflare/frontend

      - name: Build frontend (Capacitor target)
        run: npm run build:app
        working-directory: buildbarguna-cloudflare/frontend

      - name: Capacitor sync
        run: npx cap sync android
        working-directory: buildbarguna-cloudflare/frontend

      - name: Grant Gradle permissions
        run: chmod +x gradlew
        working-directory: buildbarguna-cloudflare/frontend/android

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: buildbarguna-cloudflare/frontend/android

      - name: Prepare APK
        id: apk-info
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_DATE=$(date +'%Y%m%d')
          APK_SRC="buildbarguna-cloudflare/frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          APK_NAME="buildbarguna-${BUILD_DATE}-${SHORT_SHA}-debug.apk"
          cp "$APK_SRC" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          ls -lh "$APK_NAME"

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildbarguna-debug-apk
          path: ${{ steps.apk-info.outputs.apk-name }}
          retention-days: 90

      # Upload APK to R2 via AWS CLI (separate R2 account)
      - name: Install AWS CLI
        run: pip install awscli --quiet

      - name: Upload APK to R2
        run: |
          APK_NAME="${{ steps.apk-info.outputs.apk-name }}"
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          # Upload versioned APK
          aws s3 cp "$APK_NAME" "s3://${BUCKET}/builds/android/${APK_NAME}" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/vnd.android.package-archive" \
            --no-progress

          # Upload as latest
          aws s3 cp "$APK_NAME" "s3://${BUCKET}/builds/android/buildbarguna-latest-debug.apk" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/vnd.android.package-archive" \
            --no-progress

          echo "✅ APK uploaded to R2: builds/android/${APK_NAME}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Write APK build summary
        run: |
          APK_NAME="${{ steps.apk-info.outputs.apk-name }}"
          SHORT_SHA="${{ steps.apk-info.outputs.short-sha }}"
          APK_SIZE=$(ls -lh "$APK_NAME" | awk '{print $5}')
          R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}"
          echo "## 📱 Android APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Built & Uploaded to R2 |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK name** | \`${APK_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK size** | ${APK_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest APK** | [Download](${R2_PUBLIC_URL}/builds/android/buildbarguna-latest-debug.apk) |" >> $GITHUB_STEP_SUMMARY
