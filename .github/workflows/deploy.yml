name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1: Test → Build → Deploy website to Cloudflare
  # ════════════════════════════════════════════════════════
  deploy-web:
    name: 🌐 Test → Build → Deploy Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            buildbarguna-cloudflare/package-lock.json
            buildbarguna-cloudflare/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: npm ci
        working-directory: buildbarguna-cloudflare/frontend

      - name: Run unit tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build
        working-directory: buildbarguna-cloudflare/frontend
        env:
          VITE_R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Upload web build to R2 via AWS CLI (separate R2 account)
      - name: Install AWS CLI
        run: pip install awscli --quiet

      - name: Upload web build to R2
        run: |
          BUILD_DATE=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=${GITHUB_SHA::7}
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          # dist/ is output of wrangler build — lives at buildbarguna-cloudflare/dist/
          DIST_DIR="dist"

          # Upload versioned snapshot
          aws s3 sync "$DIST_DIR/" "s3://${BUCKET}/builds/web/${BUILD_DATE}-${SHORT_SHA}/" \
            --endpoint-url "$ENDPOINT" \
            --no-progress

          # Upload latest/ snapshot — delete old files so stale files don't remain
          aws s3 sync "$DIST_DIR/" "s3://${BUCKET}/builds/web/latest/" \
            --endpoint-url "$ENDPOINT" \
            --delete \
            --no-progress

          echo "✅ Web build uploaded to R2: builds/web/${BUILD_DATE}-${SHORT_SHA}/"
          echo "Files in dist/:"
          ls -lh "$DIST_DIR/"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Write deployment summary
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          echo "## 🌐 Web Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build date** | ${BUILD_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **R2 backup** | \`builds/web/latest/\` |" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════
  # JOB 2: Build Android APK → Upload to R2
  # ════════════════════════════════════════════════════════
  build-android:
    name: 📱 Build Android APK → Upload to R2
    runs-on: ubuntu-latest
    needs: deploy-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/frontend/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci
        working-directory: buildbarguna-cloudflare/frontend

      - name: Clean dist folders
        run: rm -rf dist dist-app
        working-directory: buildbarguna-cloudflare/frontend

      - name: Build frontend (Capacitor target)
        run: npm run build:app
        working-directory: buildbarguna-cloudflare/frontend

      - name: Capacitor sync
        run: npx cap sync android
        working-directory: buildbarguna-cloudflare/frontend

      - name: Grant Gradle permissions
        run: chmod +x gradlew
        working-directory: buildbarguna-cloudflare/frontend/android

      # Auto-update versionCode + versionName from package.json — single source of truth
      # No manual build.gradle edits needed — no merge conflicts!
      - name: Update Android version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # versionCode = major*10000 + minor*100 + patch (e.g. 1.2.3 → 10203)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "📦 Version: $VERSION (code: $VERSION_CODE)"

          # Update build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle

          # Verify
          grep "versionCode\|versionName" android/app/build.gradle

          # Save for later steps
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        working-directory: buildbarguna-cloudflare/frontend

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: buildbarguna-cloudflare/frontend/android

      - name: Prepare APK
        id: apk-info
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_DATE=$(date +'%Y%m%d')
          VERSION="${{ env.APP_VERSION }}"
          APK_SRC="buildbarguna-cloudflare/frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          # Filename includes version — e.g. buildbarguna-v1.0.0-20260302-abc1234-debug.apk
          APK_NAME="buildbarguna-v${VERSION}-${BUILD_DATE}-${SHORT_SHA}-debug.apk"
          cp "$APK_SRC" "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "app-version=$VERSION" >> $GITHUB_OUTPUT
          ls -lh "$APK_NAME"

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildbarguna-debug-apk
          path: ${{ steps.apk-info.outputs.apk-name }}
          retention-days: 90

      # Upload APK to R2 via AWS CLI (separate R2 account)
      - name: Install AWS CLI
        run: pip install awscli --quiet

      - name: Upload APK to R2
        run: |
          APK_NAME="${{ steps.apk-info.outputs.apk-name }}"
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          # Upload versioned APK
          aws s3 cp "$APK_NAME" "s3://${BUCKET}/builds/android/${APK_NAME}" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/vnd.android.package-archive" \
            --no-progress

          # Delete old latest first (clean overwrite — no stale cache)
          aws s3 rm "s3://${BUCKET}/builds/android/buildbarguna-latest-debug.apk" \
            --endpoint-url "$ENDPOINT" 2>/dev/null || true

          # Upload as latest (always current)
          aws s3 cp "$APK_NAME" "s3://${BUCKET}/builds/android/buildbarguna-latest-debug.apk" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/vnd.android.package-archive" \
            --no-progress

          echo "✅ APK uploaded:"
          echo "  Versioned: builds/android/${APK_NAME}"
          echo "  Latest:    builds/android/buildbarguna-latest-debug.apk"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Write APK build summary
        run: |
          APK_NAME="${{ steps.apk-info.outputs.apk-name }}"
          SHORT_SHA="${{ steps.apk-info.outputs.short-sha }}"
          APP_VERSION="${{ steps.apk-info.outputs.app-version }}"
          APK_SIZE=$(ls -lh "$APK_NAME" | awk '{print $5}')
          R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}"
          echo "## 📱 Android APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Built & Uploaded to R2 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`v${APP_VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK name** | \`${APK_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK size** | ${APK_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest APK** | [⬇️ Download](${R2_PUBLIC_URL}/builds/android/buildbarguna-latest-debug.apk) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 To release new version: bump version in \`frontend/package.json\` and push" >> $GITHUB_STEP_SUMMARY
