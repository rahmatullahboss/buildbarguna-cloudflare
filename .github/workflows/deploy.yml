name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1: Test → Build → Deploy website to Cloudflare
  # ════════════════════════════════════════════════════════
  deploy-web:
    name: 🌐 Test → Build → Deploy Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare
    outputs:
      deploy-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            buildbarguna-cloudflare/package-lock.json
            buildbarguna-cloudflare/frontend/package-lock.json

      # ── 3. Install backend dependencies ──────────────────────────────────
      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps

      # ── 4. Install frontend dependencies ─────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: buildbarguna-cloudflare/frontend

      # ── 5. Run unit tests ─────────────────────────────────────────────────
      - name: Run unit tests
        run: npm run test:unit

      # ── 6. Build frontend (React → dist/) ────────────────────────────────
      - name: Build frontend
        run: npm run build
        working-directory: buildbarguna-cloudflare/frontend

      # ── 7. Deploy to Cloudflare Workers ──────────────────────────────────
      - name: Deploy to Cloudflare Workers
        id: deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── 8. Create R2 bucket if not exists ────────────────────────────────
      - name: Ensure R2 bucket exists
        run: |
          npx wrangler r2 bucket create buildbarguna 2>/dev/null || echo "Bucket already exists"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── 9. Upload frontend build to R2 (backup/CDN) ──────────────────────
      - name: Upload frontend build to R2
        run: |
          BUILD_DATE=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=${GITHUB_SHA::7}
          
          # Upload all dist files to R2 under builds/web/
          find dist -type f | while read file; do
            key="builds/web/${BUILD_DATE}-${SHORT_SHA}/${file#dist/}"
            echo "Uploading $file → r2://buildbarguna/$key"
            npx wrangler r2 object put "buildbarguna/$key" --file "$file" 2>/dev/null || true
          done
          
          # Also upload latest/ snapshot (always up to date)
          find dist -type f | while read file; do
            key="builds/web/latest/${file#dist/}"
            npx wrangler r2 object put "buildbarguna/$key" --file "$file" 2>/dev/null || true
          done
          
          echo "✅ Frontend build uploaded to R2: builds/web/${BUILD_DATE}-${SHORT_SHA}/"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── 10. Write deployment summary ─────────────────────────────────────
      - name: Write deployment summary
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          echo "## 🌐 Web Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build date** | ${BUILD_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **R2 backup** | \`builds/web/latest/\` |" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════
  # JOB 2: Build Android APK → Upload to R2
  # ════════════════════════════════════════════════════════
  build-android:
    name: 📱 Build Android APK → Upload to R2
    runs-on: ubuntu-latest
    needs: deploy-web  # run after web deploy succeeds

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/frontend/package-lock.json

      # ── 3. Setup Java (required for Android build) ────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Setup Android SDK ──────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install frontend dependencies ─────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: buildbarguna-cloudflare/frontend

      # ── 6. Build frontend for Capacitor ──────────────────────────────────
      - name: Build frontend (Capacitor target)
        run: npm run build:app
        working-directory: buildbarguna-cloudflare/frontend

      # ── 7. Sync Capacitor ─────────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android
        working-directory: buildbarguna-cloudflare/frontend

      # ── 8. Grant Gradle execute permissions ──────────────────────────────
      - name: Grant Gradle permissions
        run: chmod +x gradlew
        working-directory: buildbarguna-cloudflare/frontend/android

      # ── 9. Build debug APK ────────────────────────────────────────────────
      - name: Build Android Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: buildbarguna-cloudflare/frontend/android

      # ── 10. Rename APK with version info ─────────────────────────────────
      - name: Rename APK
        id: apk-info
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_DATE=$(date +'%Y%m%d')
          APK_NAME="buildbarguna-${BUILD_DATE}-${SHORT_SHA}-debug.apk"
          cp buildbarguna-cloudflare/frontend/android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "apk-name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "short-sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "build-date=$BUILD_DATE" >> $GITHUB_OUTPUT
          ls -lh "$APK_NAME"

      # ── 11. Upload APK as GitHub artifact ────────────────────────────────
      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildbarguna-debug-apk
          path: ${{ steps.apk-info.outputs.apk-name }}
          retention-days: 30

      # ── 12. Upload APK to Cloudflare R2 ──────────────────────────────────
      - name: Upload APK to R2
        run: |
          APK_NAME="${{ steps.apk-info.outputs.apk-name }}"
          SHORT_SHA="${{ steps.apk-info.outputs.short-sha }}"
          
          # Upload versioned APK
          npx wrangler r2 object put "buildbarguna/builds/android/${APK_NAME}" \
            --file "$APK_NAME" \
            --content-type "application/vnd.android.package-archive"
          
          # Also upload as latest
          npx wrangler r2 object put "buildbarguna/builds/android/buildbarguna-latest-debug.apk" \
            --file "$APK_NAME" \
            --content-type "application/vnd.android.package-archive"
          
          echo "✅ APK uploaded to R2: builds/android/${APK_NAME}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: buildbarguna-cloudflare/frontend

      # ── 13. APK build summary ─────────────────────────────────────────────
      - name: Write APK build summary
        run: |
          APK_NAME="${{ steps.apk-info.outputs.apk-name }}"
          SHORT_SHA="${{ steps.apk-info.outputs.short-sha }}"
          APK_SIZE=$(ls -lh "$APK_NAME" | awk '{print $5}')
          echo "## 📱 Android APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Built & Uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK name** | \`${APK_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK size** | ${APK_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **R2 path** | \`builds/android/${APK_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest** | \`builds/android/buildbarguna-latest-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 Download from GitHub Actions Artifacts tab (30 days retention)" >> $GITHUB_STEP_SUMMARY
