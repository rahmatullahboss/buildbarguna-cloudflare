name: CI Test - Certificate PDF Fix

on:
  push:
    branches:
      - main
    paths:
      - 'buildbarguna-cloudflare/src/index.ts'
      - 'buildbarguna-cloudflare/src/lib/pdf/**'
      - 'buildbarguna-cloudflare/src/routes/shares.ts'

jobs:
  test-certificate-fix:
    name: 🧪 Test Certificate PDF Fix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildbarguna-cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify regenerator-runtime import
        run: |
          echo "Checking if regenerator-runtime is imported in src/index.ts..."
          if grep -q "import 'regenerator-runtime/runtime'" src/index.ts; then
            echo "✅ regenerator-runtime import found"
          else
            echo "❌ regenerator-runtime import NOT found"
            exit 1
          fi

      - name: Run unit tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build
        working-directory: buildbarguna-cloudflare/frontend

      - name: Build Worker
        run: npx wrangler deploy --dry-run

      - name: ✅ Certificate PDF Fix Verified
        run: |
          echo "## 🎉 Certificate PDF Fix Verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ regenerator-runtime: Imported" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit tests: Passing" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build: Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Certificate download should now work!" >> $GITHUB_STEP_SUMMARY
