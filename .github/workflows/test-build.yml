name: Test Frontend Build

on:
  workflow_dispatch:

jobs:
  test-build:
    name: 🧪 Test Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buildbarguna-cloudflare/frontend/package-lock.json
      
      - name: Debug info
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "PWD: $(pwd)"
          ls -la
      
      - name: Install root deps
        run: |
          cd buildbarguna-cloudflare
          npm ci --legacy-peer-deps 2>&1 | tail -5
      
      - name: Install frontend deps
        run: |
          cd buildbarguna-cloudflare/frontend
          ls -la
          npm ci 2>&1 | tail -5
      
      - name: Build frontend
        run: |
          cd buildbarguna-cloudflare/frontend
          echo "Building..."
          npm run build 2>&1
          echo "Build exit code: $?"
          ls -lh dist/ 2>&1 || echo "No dist in frontend"
          ls -lh ../dist/ 2>&1 || echo "No dist in parent"
