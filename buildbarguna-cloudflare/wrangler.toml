name = "buildbarguna-worker"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
minify = true

# ── Durable Objects ────────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# Migration for Durable Objects (sqlite for free plan)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# ── Module rules: bundle binary assets directly into the Worker ───────────────
# Importing a .ttf file gives an ArrayBuffer — no network fetch needed at runtime
[[rules]]
type = "Data"
globs = ["**/*.ttf"]

# ── Observability: Worker Logs & Traces ──────────────────────────────────────
# View at: Cloudflare Dashboard → Workers → buildbarguna-worker → Logs
[observability]
enabled = true
head_sampling_rate = 1

# ── Static assets — React SPA build output ───────────────────────────────────
[assets]
directory = "dist"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
run_worker_first = true

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "buildbarguna-invest-db"
database_id = "d6cd3372-559c-4653-ac2d-87510b29130d"

# ── KV Namespace (JWT blacklist / session) ────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id = "0e5da409471743769c5e0fe9d2752bd8"

# ── R2 Bucket (Certificate storage, file uploads) ─────────────────────────────
# R2 disabled - certificates generated on-demand without persistent storage
# Logo optional, certificates work without R2 bucket

# ── Cron: 1st of every month at BD midnight (UTC 18:00) + Hourly cleanup ─────
[triggers]
crons = ["0 18 1 * *", "0 * * * *"]  # Monthly earnings + Hourly cleanup

# ── Secrets (set via: wrangler secret put SECRET_NAME) ───────────────────────
# JWT_SECRET            — JWT signing secret
# PDF_API_KEY           — PDF generation API key (PDFShift: https://pdfshift.io)
# ADOBE_CLIENT_ID       — Adobe PDF Services client ID
# ADOBE_CLIENT_SECRET   — Adobe PDF Services client secret
# R2_ACCOUNT_ID         — Cloudflare Account ID for R2 S3 API (separate account)
# R2_ACCESS_KEY_ID      — R2 API token access key
# R2_SECRET_ACCESS_KEY  — R2 API token secret
# R2_BUCKET_NAME        — R2 bucket name
# R2_PUBLIC_URL         — Public R2 bucket URL
# RESEND_API_KEY        — Resend email API key (for password reset emails)
# EMAIL_FROM            — Sender email address (e.g., "BuildBarguna <noreply@buildbarguna.com>")
# GOOGLE_CLIENT_ID      — Google OAuth 2.0 Client ID (for Google Sign-In)
# FRONTEND_URL          — Frontend URL for redirects (e.g., https://buildbarguna.com)
