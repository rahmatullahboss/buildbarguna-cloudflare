name = "buildbarguna-worker"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
minify = true

# ── Observability: Worker Logs & Traces ──────────────────────────────────────
# Enables real-time logs + tail workers in Cloudflare Dashboard
# View at: https://dash.cloudflare.com → Workers → buildbarguna-worker → Logs
[observability]
enabled = true
head_sampling_rate = 1  # 100% of requests traced (reduce to 0.1 in high traffic)

# ── Static assets — React SPA build output ───────────────────────────────────
[assets]
directory = "dist"
html_handling = "none"
not_found_handling = "single-page-application"

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "buildbarguna-invest-db"
database_id = "d6cd3372-559c-4653-ac2d-87510b29130d"

# ── KV Namespace (JWT blacklist / session) ────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id = "0e5da409471743769c5e0fe9d2752bd8"

# ── R2 Bucket (project images + APK builds) ──────────────────────────────────
# Native binding — no S3 API credentials needed
[[r2_buckets]]
binding = "FILES"
bucket_name = "buildbarguna-files"

# ── Cron: 1st of every month at BD midnight (UTC 18:00) ──────────────────────
[triggers]
crons = ["0 18 1 * *"]

# ── Secrets (set via: wrangler secret put SECRET_NAME) ───────────────────────
# JWT_SECRET     — JWT signing secret
# R2_PUBLIC_URL  — Public R2 bucket URL e.g. https://pub-xxxx.r2.dev
